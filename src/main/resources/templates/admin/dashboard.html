<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>H&H Dashboard - Hệ Thống Quản Trị</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f3f5f9;
            --sidebar-bg: #ffffff;
            --primary-dark: #111111;
            --accent-gold: #c5a880;
            --text-main: #2b2b2b;
            --text-muted: #8b92a5;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            overflow-x: hidden;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #999; }

        /* Stats Cards */
        .stat-card {
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 20px;
            flex-shrink: 0;
        }
        .stat-icon.revenue { background: rgba(32, 201, 151, 0.1); color: #20c997; }
        .stat-icon.orders { background: rgba(17, 17, 17, 0.05); color: #111; }
        .stat-icon.stock { background: rgba(255, 99, 132, 0.1); color: #ff6384; }
        
        .stat-info h5 { margin: 0; font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        .stat-info h2 { margin: 5px 0 0; font-size: 28px; font-weight: 800; color: var(--primary-dark); }
        
        /* Chart Card */
        .chart-card {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .chart-title { font-size: 18px; font-weight: 700; color: var(--primary-dark); margin: 0; }
        .chart-badge { background: #f8f9fa; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); }
        
        /* Layout overrides */
        .px-md-5 { padding-left: 3rem !important; padding-right: 3rem !important; }
        .page-title { font-weight: 800; font-size: 28px; letter-spacing: -0.5px; color: #111; }
        
        /* Welcome Banner */
        .welcome-banner {
            background: linear-gradient(135deg, #111 0%, #333 100%);
            border-radius: 20px;
            padding: 30px;
            color: #fff;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(17,17,17,0.15);
            position: relative;
            overflow: hidden;
        }
        .welcome-banner::after {
            content: '';
            position: absolute;
            right: -50px;
            top: -50px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
        }
        .welcome-banner h3 { font-weight: 800; margin-bottom: 5px; }
        .welcome-banner p { color: rgba(255,255,255,0.7); margin: 0; font-size: 15px; }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 mt-4 pb-5">
            
            <div class="welcome-banner d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h3>Chào mừng trở lại, Admin!</h3>
                    <p>Cùng xem tổng quan tình hình kinh doanh của H&H Sneaker hôm nay.</p>
                </div>
                <div>
                    <a href="/" class="btn btn-light fw-bold rounded-pill px-4 py-2">
                        <i class="fa-solid fa-store me-2"></i>Xem Cửa Hàng
                    </a>
                </div>
            </div>
            
            <div class="row mb-4 g-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-icon revenue"><i class="fa-solid fa-sack-dollar"></i></div>
                        <div class="stat-info">
                            <h5>Doanh Thu Tháng</h5>
                            <h2 th:text="${#numbers.formatInteger(monthlyRevenue, 0, 'POINT')} + ' ₫'">0 ₫</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-icon orders"><i class="fa-solid fa-box-open"></i></div>
                        <div class="stat-info">
                            <h5>Đơn Hàng Mới</h5>
                            <h2 th:text="${newOrders}">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-icon stock"><i class="fa-solid fa-shoe-prints"></i></div>
                        <div class="stat-info">
                            <h5>Hết Hàng</h5>
                            <h2><span th:text="${outOfStock}">0</span> <span style="font-size: 14px; font-weight: 500; color: #ff6384;">sản phẩm</span></h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-header">
                    <h5 class="chart-title">Biểu đồ doanh thu 7 ngày</h5>
                    <div class="chart-badge">Cập nhật: Vừa xong</div>
                </div>
                <div style="position: relative; height:350px; width:100%">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </main>
    </div>
</div>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        const ctx = document.getElementById('revenueChart').getContext('2d');
        
        // Create Gradient
        let gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(17, 17, 17, 0.5)');
        gradient.addColorStop(1, 'rgba(17, 17, 17, 0.0)');

        const chartLabels = /*[[${chartLabels}]]*/ ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
        const chartData = /*[[${chartData}]]*/ [0, 0, 0, 0, 0, 0, 0];

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartLabels,
                datasets: [{
                    label: 'Doanh thu (VNĐ)',
                    data: chartData,
                    borderColor: '#111',
                    backgroundColor: gradient,
                    borderWidth: 3,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#111',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    fill: true,
                    tension: 0.4 // Makes line smooth/curved
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#111',
                        titleFont: { size: 14, family: 'Outfit' },
                        bodyFont: { size: 14, family: 'Outfit', weight: 'bold' },
                        padding: 12,
                        displayColors: false,
                        callbacks: {
                            label: function(context) {
                                return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(context.raw);
                            }
                        }
                    }
                },
                scales: {
                    x: { grid: { display: false } },
                    y: { 
                        grid: { borderDash: [5, 5], color: '#f0f0f0' },
                        ticks: {
                            callback: function(value) {
                                if (value >= 1000000) {
                                    return value / 1000000 + 'M';
                                } else if (value >= 1000) {
                                    return value / 1000 + 'K';
                                }
                                return value;
                            }
                        }
                    }
                }
            }
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
