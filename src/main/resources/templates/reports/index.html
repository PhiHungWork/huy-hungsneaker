<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Báo Cáo - H&H Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Inter', sans-serif; background: #f4f6f8; }</style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 mt-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                <h1 class="h3 fw-bold">Báo Cáo Doanh Thu</h1>
                <a th:if="${orders != null}" th:href="@{/reports/export(startDate=${startDate}, endDate=${endDate})}" class="btn btn-success fw-bold px-4">
                    <i class="fa-solid fa-file-excel me-2"></i> TẢI XUỐNG EXCEL
                </a>
            </div>
            
            <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                <p class="text-muted mb-4">Lựa chọn khoảng thời gian để xem và xuất dữ liệu báo cáo doanh thu.</p>
                <form th:action="@{/reports}" method="get">
                    <div class="row g-3 mb-4 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Từ ngày</label>
                            <input type="date" name="startDate" class="form-control" th:value="${startDate}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Đến ngày</label>
                            <input type="date" name="endDate" class="form-control" th:value="${endDate}" required>
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-dark fw-bold w-100 py-2">
                                <i class="fa-solid fa-filter me-2"></i> XEM BÁO CÁO
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            
            <div th:if="${orders != null}" class="card border-0 shadow-sm rounded-4 p-4 mb-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0">Danh sách đơn hàng hoàn thành</h5>
                    <div class="text-end">
                        <span class="text-muted d-block" style="font-size: 13px;">Tổng doanh thu</span>
                        <h4 class="fw-bold text-success mb-0" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></h4>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Mã Đơn</th>
                                <th>Thời Gian Bán</th>
                                <th>Khách Hàng</th>
                                <th>Số Tiền</th>
                                <th>Trạng Thái</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="o : ${orders}">
                                <td class="fw-bold text-primary" th:text="${o.orderCode}"></td>
                                <td th:text="${#temporals.format(o.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                                <td th:text="${o.customerName}"></td>
                                <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                                <td><span class="badge bg-success">Đã giao</span></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(orders)}">
                                <td colspan="5" class="text-center py-4 text-muted">Không có đơn hàng nào trong thời gian này.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
