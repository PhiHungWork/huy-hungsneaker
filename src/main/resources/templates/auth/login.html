<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Quản Trị - Huy & Hưng Sneaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #fdfbf7;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            display: flex;
        }

        .login-img {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1556906781-9a412961c28c?q=80&w=800') center/cover;
            position: relative;
        }

        .login-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
        }

        .login-img-text {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: #fff;
            z-index: 1;
        }

        .login-form-wrap {
            flex: 1;
            padding: 60px 50px;
        }

        .form-control {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1.5px solid #eaeaea;
        }

        .form-control:focus {
            border-color: #111;
            box-shadow: none;
        }

        .btn-black {
            background: #111;
            color: #fff;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-black:hover {
            background: #333;
            transform: translateY(-2px);
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="login-card mx-auto">
            <div class="login-img d-none d-md-block">
                <div class="login-img-text">
                    <h3 class="fw-bold mb-1">H&H Dashboard</h3>
                    <p class="mb-0 text-white-50">Hệ thống quản trị và báo cáo tài chính.</p>
                </div>
            </div>
            <div class="login-form-wrap">
                <h2 class="fw-bold mb-4">Quản trị</h2>

                <div th:if="${param.error}" class="alert alert-danger rounded-3 border-0 py-2">
                    Tài khoản hoặc mật khẩu không chính xác.
                </div>
                <div th:if="${param.logout}" class="alert alert-success rounded-3 border-0 py-2">
                    Bạn đã đăng xuất thành công.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-muted small">Tên Quản trị</label>
                        <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập..."
                            required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-muted small">Mật Khẩu</label>
                        <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu..."
                            required>
                    </div>

                    <button type="submit" class="btn btn-black w-100 mb-3">Đăng Nhập Hệ Thống</button>

                    <div class="text-center mt-2">
                        <a href="/" class="text-decoration-none text-muted small fw-medium">&larr; Quay lại cửa hàng</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
