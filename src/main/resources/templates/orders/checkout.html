<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán Đơn Hàng - H&H Sneaker</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-dark: #111111;
            --accent-color: #2b6cb0;
            --text-main: #2d3748;
            --text-muted: #718096;
            --bg-color: #f7fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 80px;
        }
        .navbar-hh {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 0;
        }
        .logo-text {
            font-weight: 900;
            font-size: 24px;
            color: var(--primary-dark);
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .logo-text .dot {
            color: #d69e2e;
        }
        .checkout-title {
            font-weight: 800;
            font-size: 32px;
            color: var(--primary-dark);
            letter-spacing: -0.5px;
            margin-top: 40px;
            margin-bottom: 30px;
        }
        .card-checkout {
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #edf2f7;
            box-shadow: 0 10px 30px rgba(0,0,0,0.01);
            padding: 30px;
        }
        .card-header-hh {
            font-weight: 700;
            font-size: 18px;
            color: var(--primary-dark);
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-label-hh {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .form-control-hh {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .form-control-hh:focus {
            border-color: var(--primary-dark);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
            outline: none;
        }
        .btn-pay-method {
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            padding: 20px;
            width: 100%;
            text-align: left;
            background: #ffffff;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }
        .btn-pay-method:hover {
            border-color: #cbd5e0;
        }
        .btn-pay-method.active {
            border-color: var(--primary-dark);
            background: rgba(0,0,0,0.01);
        }
        .btn-pay-method input[type="radio"] {
            position: absolute;
            right: 20px;
            accent-color: var(--primary-dark);
            width: 18px;
            height: 18px;
        }
        .btn-pay-method .pay-icon {
            font-size: 24px;
            color: var(--primary-dark);
            width: 40px;
            text-align: center;
        }
        .btn-pay-method .pay-title {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 2px;
        }
        .btn-pay-method .pay-desc {
            font-size: 12px;
            color: var(--text-muted);
        }
        .product-summary-card {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #edf2f7;
        }
        .product-summary-img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid #edf2f7;
        }
        .summary-price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
            font-weight: 500;
        }
        .summary-price-total {
            display: flex;
            justify-content: space-between;
            border-top: 2px solid #edf2f7;
            padding-top: 15px;
            margin-top: 15px;
            font-size: 18px;
            font-weight: 800;
            color: var(--primary-dark);
        }
        .btn-order-hh {
            background: var(--primary-dark);
            color: #ffffff;
            border-radius: 14px;
            padding: 16px;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            border: none;
            transition: all 0.2s;
            margin-top: 20px;
        }
        .btn-order-hh:hover {
            background: #2d3748;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<nav class="navbar-hh">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="logo-text" href="/">H&H<span class="dot">.</span></a>
        <a href="/cart" class="btn btn-sm btn-outline-dark fw-bold rounded-3"><i class="fa-solid fa-arrow-left me-1"></i> Trở lại giỏ hàng</a>
    </div>
</nav>

<div class="container">
    <h1 class="checkout-title">Thông Tin Thanh Toán</h1>
    
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-3 mb-4" role="alert">
        <i class="fa-solid fa-triangle-exclamation me-2"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form th:action="@{/orders/place}" method="post" id="checkoutForm">
        
        <div class="row">
            <!-- Cột trái: Thông tin khách hàng & Thanh toán -->
            <div class="col-lg-7 mb-4">
                <div class="card-checkout mb-4">
                    <div class="card-header-hh">
                        <i class="fa-solid fa-truck text-dark"></i> Địa Chỉ Giao Hàng
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label form-label-hh">Họ và Tên Người Nhận</label>
                        <input type="text" name="customerName" th:value="${customerName}" class="form-control form-control-hh" placeholder="Nhập đầy đủ họ và tên" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label form-label-hh">Số Điện Thoại</label>
                        <input type="text" name="customerPhone" th:value="${customerPhone}" class="form-control form-control-hh" placeholder="Nhập số điện thoại nhận hàng" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label form-label-hh">Địa Chỉ Giao Hàng</label>
                        <input type="text" name="customerAddress" th:value="${customerAddress}" class="form-control form-control-hh" placeholder="Số nhà, tên đường, phường/xã, quận/huyện, tỉnh/thành" required>
                    </div>
                    
                    <div class="mb-0">
                        <label class="form-label form-label-hh">Ghi chú giao hàng (nếu có)</label>
                        <textarea name="note" rows="3" class="form-control form-control-hh" placeholder="Ví dụ: Giao ngoài giờ hành chính, gọi trước khi giao..."></textarea>
                    </div>

                    <div class="mt-3">
                        <label class="form-label form-label-hh">Email nhận thông báo đơn hàng</label>
                        <input type="email" name="customerEmail" class="form-control form-control-hh" placeholder="Ví dụ: nguyenvana@gmail.com" required>
                        <small class="text-muted">Hệ thống sẽ tự động gửi mã đơn hàng và thông tin chi tiết qua email này.</small>
                    </div>
                </div>

                <div class="card-checkout">
                    <div class="card-header-hh">
                        <i class="fa-solid fa-credit-card text-dark"></i> Phương Thức Thanh Toán
                    </div>
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="btn-pay-method active" id="labelCod">
                                <input type="radio" name="paymentMethod" value="COD" checked>
                                <div class="pay-icon"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                                <div>
                                    <div class="pay-title">Thanh toán COD</div>
                                    <div class="pay-desc">Thanh toán tiền mặt khi nhận hàng</div>
                                </div>
                            </label>
                        </div>
                        <div class="col-md-6">
                            <label class="btn-pay-method" id="labelBank">
                                <input type="radio" name="paymentMethod" value="BANK">
                                <div class="pay-icon"><i class="fa-solid fa-building-columns"></i></div>
                                <div>
                                    <div class="pay-title">Chuyển khoản</div>
                                    <div class="pay-desc">Chuyển khoản ngân hàng qua QR Code</div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cột phải: Tóm tắt đơn hàng -->
            <div class="col-lg-5">
                <div class="card-checkout" style="position: sticky; top: 20px;">
                    <div class="card-header-hh">
                        <i class="fa-solid fa-basket-shopping text-dark"></i> Tóm Tắt Đơn Hàng (<span th:text="${@shoppingCart.itemCount}">0</span> sản phẩm)
                    </div>

                    <div th:each="item : ${cartItems}" class="product-summary-card">
                        <img th:src="${item.imageUrl}" class="product-summary-img" alt="Product Image">
                        <div style="flex: 1;">
                            <h6 class="fw-bold mb-1" th:text="${item.productName}"></h6>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-muted small">Size: <span th:text="${item.size}"></span></span>
                                <span class="text-muted small">x<span th:text="${item.quantity}"></span></span>
                            </div>
                            <div class="fw-bold mt-1 text-end text-danger" th:text="${#numbers.formatDecimal(item.lineTotal, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                        </div>
                    </div>

                    <div class="summary-price-row mt-3">
                        <span class="text-muted">Tạm tính</span>
                        <span class="fw-bold" th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                    </div>
                    <div class="summary-price-row">
                        <span class="text-muted">Phương thức thanh toán</span>
                        <span class="fw-bold" id="summaryPayment">COD</span>
                    </div>
                    <div class="summary-price-row">
                        <span class="text-muted">Phí vận chuyển</span>
                        <span class="text-success fw-bold">Miễn phí</span>
                    </div>

                    <div class="summary-price-total">
                        <span>Tổng thanh toán</span>
                        <span id="displayTotalPrice" th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                    </div>

                    <button type="submit" class="btn-order-hh" id="submitOrderBtn">ĐẶT HÀNG NGAY</button>
                </div>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Payment Method Active Class toggle
        const radioCod = document.querySelector('input[value="COD"]');
        const radioBank = document.querySelector('input[value="BANK"]');
        const labelCod = document.getElementById("labelCod");
        const labelBank = document.getElementById("labelBank");
        const summaryPayment = document.getElementById("summaryPayment");

        radioCod.addEventListener("change", function() {
            if (this.checked) {
                labelCod.classList.add("active");
                labelBank.classList.remove("active");
                summaryPayment.textContent = "COD";
            }
        });

        radioBank.addEventListener("change", function() {
            if (this.checked) {
                labelBank.classList.add("active");
                labelCod.classList.remove("active");
                summaryPayment.textContent = "Chuyển khoản";
            }
        });

        // Form Validation on Submit
        const form = document.getElementById("checkoutForm");
        form.addEventListener("submit", function(event) {
            const currentPayment = document.querySelector('input[name="paymentMethod"]:checked').value;
            const displayTotalPrice = document.getElementById("displayTotalPrice").textContent;
            
            const confirmText = `Xác nhận đặt hàng?\n- Thanh toán: ${currentPayment}\n- Tổng tiền: ${displayTotalPrice}`;
            if (!window.confirm(confirmText)) {
                event.preventDefault();
            }
        });
    });
</script>
</body>
</html>
