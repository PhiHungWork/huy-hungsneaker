<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theo Dõi Đơn Hàng - H&H Sneaker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f7fafc; }
        .card-box { border-radius: 18px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 760px;">
    <a href="/" class="text-dark text-decoration-none mb-4 d-inline-block fw-bold" style="font-size: 15px;">
        <i class="fa-solid fa-arrow-left me-2"></i> Quay lại cửa hàng
    </a>
    <h2 class="fw-bold mb-4">Theo Dõi Đơn Hàng</h2>

    <div class="card card-box p-4 mb-4">
        <form method="get" th:action="@{/orders/track}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Mã đơn hàng</label>
                <input class="form-control" name="orderCode" th:value="${orderCode}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Số điện thoại đặt hàng</label>
                <input class="form-control" name="phone" th:value="${phone}" required>
            </div>
            <button class="btn btn-dark">Tra cứu</button>
            <a href="/" class="btn btn-outline-secondary ms-2">Về trang chủ</a>
        </form>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${order != null}" class="card card-box p-4">
        <h5 class="fw-bold mb-3">Thông tin đơn hàng</h5>
        <div class="mb-2"><strong>Mã đơn:</strong> <span th:text="${order.orderCode}"></span></div>
        <div class="mb-2"><strong>Người nhận:</strong> <span th:text="${order.customerName}"></span></div>
        <div class="mb-2"><strong>SĐT:</strong> <span th:text="${order.customerPhone}"></span></div>
        <div class="mb-2"><strong>Địa chỉ:</strong> <span th:text="${order.customerAddress}"></span></div>
        <div class="mb-2"><strong>Trạng thái:</strong> <span class="fw-bold" th:text="${order.status}"></span></div>
        <div><strong>Tổng tiền:</strong> <span class="text-danger fw-bold" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span></div>
    </div>
</div>
</body>
</html>
